name: E2E

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Deliberately kept out of ci.yml: these tests drive a real headless
# Chrome (see internal/server/e2e_test.go, gated by the "e2e" build
# tag - go test ./... never compiles them) and are slower and less
# deterministic than the rest of the suite. Isolated in its own
# workflow/job so a Chrome-related flake never red-Xs ci.yml's fast,
# deterministic checks. ubuntu-latest only (needs Docker, which every
# GitHub-hosted runner OS technically has, but this suite doesn't test
# anything OS-specific anyway - see ci.yml's test job for that
# coverage).
#
# Go and Chrome both come from Dockerfile.e2e (a pinned image, not
# whatever's on the runner) - see make test-e2e and the Dockerfile's
# own comment for why: this suite's first real CI failure was caused
# by never having tested against whichever Chrome build ubuntu-latest
# actually had preinstalled, only ones tested locally.
jobs:
  e2e:
    name: e2e (chromedp browser tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: make test-e2e
        run: make test-e2e
